<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0f1e; color: white; font-family: sans-serif; padding: 20px; }
        .btn {
            background: #4a90e2;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        .wallet-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0f1e;
            display: none;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn" id="depositBtn">📥 Пополнить</button>
    </div>

    <div id="walletScreen" class="wallet-screen">
        <button onclick="hideWallet()">← Назад</button>
        <h2>Пополнение</h2>
        <input type="number" id="amountInput" placeholder="Сумма" min="10" value="100">
        <button class="btn" id="submitBtn">ВВОД</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();

        // Прямое назначение обработчиков
        document.getElementById('depositBtn').onclick = function() {
            document.getElementById('walletScreen').style.display = 'block';
        };

        window.hideWallet = function() {
            document.getElementById('walletScreen').style.display = 'none';
        };

        document.getElementById('submitBtn').onclick = function() {
            let amount = document.getElementById('amountInput').value;
            alert('Пополнение на ' + amount + '⭐');
            hideWallet();
        };
    </script>
</body>
</html>
